<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessWallah - Customer Master</title>
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/masters.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="light-workspace">
    <div class="app-container">
        <aside id="app-sidebar"></aside>
        <div class="main-layout">
            <header id="app-header"></header>
            <main class="workspace-content">
                <div class="workspace-header">
                    <div class="breadcrumb">
                        <a href="#">Masters</a> / <span>Customer Registry</span>
                    </div>
                    <div class="title-toolbar">
                        <h1>Customer Master Registry</h1>
                    </div>
                </div>
                <div class="search-filter-bar">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search B2B Client register...">
                    </div>
                    <button class="btn btn-secondary" onclick="triggerToast('Directory export locked.', 'warning')">
                        <i data-lucide="download"></i> Export Register
                    </button>
                </div>
                <div class="empty-state-card">
                    <div class="empty-state-icon"><i data-lucide="users"></i></div>
                    <h3>Customer Directory Unpopulated</h3>
                    <p>Enrollments of B2B enterprises, delivery zones parameters configuration controls deploy in Sprint 6.</p>
                </div>
            </main>
            <footer id="app-footer"></footer>
        </div>
    </div>
    <script src="../../js/common.js"></script>
    <script src="../../js/router.js"></script>
    <script src="../../js/layout.js"></script>
    <script src="../../js/masters.js"></script>
</body>
</html>
