<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessWallah - Scheduling</title>
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/sales.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="light-workspace">
    <div class="app-container">
        <aside id="app-sidebar"></aside>
        <div class="main-layout">
            <header id="app-header"></header>
            <main class="workspace-content">
                <div class="workspace-header">
                    <div class="breadcrumb">
                        <a href="#">Sales</a> / <span>Capacity Scheduling</span>
                    </div>
                    <div class="title-toolbar">
                        <h1>Shift Scheduling Planner</h1>
                    </div>
                </div>
                <div class="search-filter-bar">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search machine asset scheduling...">
                    </div>
                    <button class="btn btn-secondary" onclick="triggerToast('Schedule exports locked.', 'warning')">
                        <i data-lucide="download"></i> Export Schedule
                    </button>
                </div>
                <div class="empty-state-card">
                    <div class="empty-state-icon"><i data-lucide="calendar"></i></div>
                    <h3>Machine Schedule Timeline Empty</h3>
                    <p>Work center schedules alignments, shift slots allocation tools, and optimization engines deploy in Sprint 2.</p>
                </div>
            </main>
            <footer id="app-footer"></footer>
        </div>
    </div>
    <script src="../../js/common.js"></script>
    <script src="../../js/router.js"></script>
    <script src="../../js/layout.js"></script>
    <script src="../../js/sales.js"></script>
</body>
</html>
