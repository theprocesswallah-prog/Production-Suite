<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFA INTERCONTINENTAL - Capacity Scheduling</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/sales.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Scheduling Custom Timeline Layout Mock */
        .gantt-wrapper {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-top: 1.5rem;
        }

        .gantt-grid-header {
            display: grid;
            grid-template-columns: 200px 1fr;
            background-color: #f1f5f9;
            border-bottom: 2px solid var(--border-color);
        }

        .gantt-grid-header div {
            padding: 12px 16px;
            font-weight: 700;
            color: #475569;
        }

        .gantt-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }

        .gantt-machine-label {
            padding: 16px;
            font-weight: 600;
            background-color: #fafcfd;
            border-right: 1px solid var(--border-color);
            font-size: 13px;
        }

        .gantt-slots-track {
            position: relative;
            height: 50px;
            padding: 4px;
            background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px);
            background-size: 25% 100%;
        }

        .gantt-block {
            position: absolute;
            background-color: var(--primary-light);
            color: var(--primary-hover);
            border: 1px solid var(--primary);
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            top: 8px;
            height: 34px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .gantt-block:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="light-workspace">
    <div class="app-container">
        <aside id="app-sidebar"></aside>

        <div class="main-layout">
            <header id="app-header"></header>

            <main class="workspace-content">
                <div class="workspace-header">
                    <div class="breadcrumb">
                        <a href="#">Sales Operations</a> / <span>Capacity Scheduling</span>
                    </div>
                    <div class="title-toolbar">
                        <h1>Work Center Allocations</h1>
                        <button class="btn btn-primary" onclick="triggerToast('Automatic optimization engine runs in Sprint 2', 'info')">
                            Auto-Optimize Shift
                        </button>
                    </div>
                </div>

                <div class="search-filter-bar">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search workstation slots...">
                    </div>
                    <div class="filter-box">
                        <select class="form-control">
                            <option>Shift A (06:00 - 14:00)</option>
                            <option>Shift B (14:00 - 22:00)</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary" onclick="triggerToast('Exporting active shift layout...', 'success')">
                        <i data-lucide="download"></i> Export Schedule
                    </button>
                </div>

                <!-- Timeline Output Representation -->
                <div class="gantt-wrapper">
                    <div class="gantt-grid-header">
                        <div>Machine Center ID</div>
                        <div style="display: flex; justify-content: space-between;">
                            <span>06:00</span>
                            <span>08:00</span>
                            <span>10:00</span>
                            <span>12:00</span>
                            <span>14:00</span>
                        </div>
                    </div>

                    <div class="gantt-row">
                        <div class="gantt-machine-label">CNC Winding #01</div>
                        <div class="gantt-slots-track">
                            <div class="gantt-block" style="left: 10%; width: 40%;" onclick="triggerToast('Active turns calculation target is 800 turns.', 'info')">
                                Batch-HT029 [Active]
                            </div>
                            <div class="gantt-block" style="left: 55%; width: 35%; background-color: #e0f2fe; color:#0369a1; border-color:#06b6d4;" onclick="triggerToast('Awaiting material supply clearing.', 'info')">
                                Batch-HT030 [Queued]
                            </div>
                        </div>
                    </div>

                    <div class="gantt-row">
                        <div class="gantt-machine-label">Core Stacking Station</div>
                        <div class="gantt-slots-track">
                            <div class="gantt-block" style="left: 20%; width: 60%;" onclick="triggerToast('Standard Clamping pressure is 1500 N.', 'info')">
                                Batch-LT442 [In-Progress]
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <footer id="app-footer"></footer>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/sales.js"></script>
</body>
</html>
