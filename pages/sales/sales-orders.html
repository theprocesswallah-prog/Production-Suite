<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessWallah - Sales Orders</title>
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/sales.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="light-workspace">
    <div class="app-container">
        <aside id="app-sidebar"></aside>

        <div class="main-layout">
            <header id="app-header"></header>

            <main class="workspace-content">
                <div class="workspace-header">
                    <div class="breadcrumb">
                        <a href="#">Sales</a> / <span>Sales Orders</span>
                    </div>
                    <div class="title-toolbar">
                        <h1>Sales Orders Intake</h1>
                        <button class="btn btn-primary" onclick="triggerToast('Form interface locks in Sprint 2', 'warning')">
                            <i data-lucide="plus"></i> Create Sales Order
                        </button>
                    </div>
                </div>

                <div class="search-filter-bar">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search orders by Client...">
                    </div>
                    <div class="filter-box">
                        <select class="form-control">
                            <option>All Statuses</option>
                            <option>Pending</option>
                            <option>Released</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary" onclick="triggerToast('Data export locked.', 'warning')">
                        <i data-lucide="download"></i> Export Data
                    </button>
                </div>

                <div class="empty-state-card">
                    <div class="empty-state-icon"><i data-lucide="shopping-cart"></i></div>
                    <h3>No Active Sales Orders</h3>
                    <p>Sales pipeline inputs integration structures and order entries forms will be fully active in Sprint 2.</p>
                </div>
            </main>

            <footer id="app-footer"></footer>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/router.js"></script>
    <script src="../../js/layout.js"></script>
    <script src="../../js/sales.js"></script>
</body>
</html>
