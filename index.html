<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProcessWallah - Dashboard</title>
    <!-- Direct link from root folder level -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="light-workspace">
    <div class="app-container">
        <!-- Sidebar injected dynamically by layout.js -->
        <aside id="app-sidebar"></aside>

        <div class="main-layout">
            <!-- Header injected dynamically by layout.js -->
            <header id="app-header"></header>

            <main class="workspace-content">
                <div class="workspace-header">
                    <div class="breadcrumb">
                        <a href="#">Home</a> / <span>Dashboard</span>
                    </div>
                    <div class="title-toolbar">
                        <h1>Dashboard Summary</h1>
                    </div>
                </div>

                <div class="search-filter-bar">
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search orders, materials or metrics...">
                    </div>
                    <div class="filter-box">
                        <select class="form-control">
                            <option>All Shifts</option>
                            <option>Shift A</option>
                            <option>Shift B</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary" onclick="triggerToast('Loading shift excel dataset...', 'info')">
                        <i data-lucide="download"></i> Export Reports
                    </button>
                </div>

                <!-- Empty state placeholder -->
                <div class="empty-state-card">
                    <div class="empty-state-icon">
                        <i data-lucide="gauge"></i>
                    </div>
                    <h3>Dashboard Indicators Awaiting Sprints</h3>
                    <p>Metrics panels, production outputs indices, OEE gauges require active Work Orders and Production logs from upcoming sprints.</p>
                </div>
            </main>

            <!-- Footer injected dynamically by layout.js -->
            <footer id="app-footer"></footer>
        </div>
    </div>

    <!-- Core assets mapped directly from root -->
    <script src="js/common.js"></script>
    <script src="js/router.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
